<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนิเทศการสอน โรงเรียนวัดแม่กะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .header-bg {
            background-color: #C8102E; color: #FFD100;
            padding: 20px 0; border-bottom: 5px solid #FFD100;
        }
        .logo-circle {
            background-color: white; border-radius: 50%;
            padding: 10px; width: 120px; height: 120px;
            object-fit: contain; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-header { background-color: #C8102E; color: white; font-weight: 600; }
        .btn-primary { background-color: #C8102E; border-color: #C8102E; }
        .btn-primary:hover { background-color: #a00d24; }
        .nav-tabs .nav-link { color: #C8102E; font-weight: 500; }
        .nav-tabs .nav-link.active { color: white; background-color: #C8102E; border-color: #C8102E; }
        .signature-pad { border: 2px dashed #ccc; border-radius: 5px; width: 100%; height: 150px; background-color: white; }
        .comment-pad { border: 1px solid #C8102E; width: 100%; height: 120px; background-color: #fffafb; }
        .table-responsive { margin-bottom: 20px; }
        .question-text { text-align: left; font-size: 15px; }
    </style>
</head>
<body>

<div class="header-bg text-center mb-4">
    <img src="https://img2.pic.in.th/logob0b7643db577ceee.png" alt="โลโก้โรงเรียนวัดแม่กะ" class="logo-circle mb-3">
    <h2>ระบบนิเทศการสอน โรงเรียนวัดแม่กะ</h2>
</div>

<div class="container mb-5">
    <ul class="nav nav-tabs mb-4" id="mainTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="form-tab" data-bs-toggle="tab" data-bs-target="#form-pane" type="button" role="tab">1. บันทึกการนิเทศ</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="summary-tab" data-bs-toggle="tab" data-bs-target="#summary-pane" type="button" role="tab" onclick="loadSummary()">2. สรุปผลการนิเทศ</button>
        </li>
    </ul>

    <div class="tab-content" id="mainTabContent">
        
        <div class="tab-pane fade show active" id="form-pane" role="tabpanel">
            <form id="evalForm">
                <div class="card shadow-sm mb-4">
                    <div class="card-header">ข้อมูลทั่วไป</div>
                    <div class="card-body row g-3">
                        <div class="col-md-6">
                            <label class="form-label">ชื่อผู้รับการนิเทศ</label>
                            <select class="form-select" id="evaluateeName" required><option value="">-- เลือกชื่อ --</option></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ชื่อผู้นิเทศ</label>
                            <select class="form-select" id="evaluatorName" required><option value="">-- เลือกชื่อ --</option></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">รูปแบบการนิเทศ</label>
                            <select class="form-select" id="supervisionFormat" required>
                                <option value="">-- เลือกรูปแบบ --</option>
                                <option value="เพื่อนนิเทศเพื่อน">เพื่อนนิเทศเพื่อน</option>
                                <option value="นิเทศโดยฝ่ายวิชาการ">นิเทศโดยฝ่ายวิชาการ</option>
                                <option value="นิเทศโดยผู้บริหาร">นิเทศโดยผู้บริหาร</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">รายวิชา</label>
                            <input type="text" class="form-control" id="subject" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">รหัสวิชา</label>
                            <input type="text" class="form-control" id="subjectCode" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">ระดับชั้น</label>
                            <select class="form-select" id="classLevel" required>
                                <option value="">-- เลือกระดับชั้น --</option>
                                <option value="ชั้นประถมศึกษาปีที่ 1">ชั้นประถมศึกษาปีที่ 1</option>
                                <option value="ชั้นประถมศึกษาปีที่ 2">ชั้นประถมศึกษาปีที่ 2</option>
                                <option value="ชั้นประถมศึกษาปีที่ 3">ชั้นประถมศึกษาปีที่ 3</option>
                                <option value="ชั้นประถมศึกษาปีที่ 4">ชั้นประถมศึกษาปีที่ 4</option>
                                <option value="ชั้นประถมศึกษาปีที่ 5">ชั้นประถมศึกษาปีที่ 5</option>
                                <option value="ชั้นประถมศึกษาปีที่ 6">ชั้นประถมศึกษาปีที่ 6</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">วันที่สอน</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">เวลา (พิมพ์เป็นข้อความ)</label>
                            <input type="text" class="form-control" id="time" placeholder="เช่น 09.00 - 10.00 น." required>
                        </div>
                    </div>
                </div>

                <div id="evaluationQuestions"></div>

                <div class="card shadow-sm mb-4 border-warning">
                    <div class="card-header bg-warning text-dark">สรุปผลการประเมิน (คำนวณอัตโนมัติ)</div>
                    <div class="card-body text-center">
                        <h4 class="mb-3">คะแนนรวม: <span id="totalScoreText" class="text-danger fw-bold">0</span> / 200</h4>
                        <h4 class="mb-3">คิดเป็นร้อยละ: <span id="percentText" class="text-danger fw-bold">0</span> %</h4>
                        <h3 class="mb-0">ระดับคุณภาพ: <span id="qualityText" class="text-success fw-bold">-</span></h3>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header">การลงนาม</div>
                    <div class="card-body row g-4">
                        <div class="col-md-6 text-center">
                            <label class="form-label fw-bold">ลายมือชื่อ ผู้รับการนิเทศ</label>
                            <canvas id="signEvaluatee" class="signature-pad"></canvas>
                            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="padEvaluatee.clear()">ลบลายเซ็น</button>
                        </div>
                        <div class="col-md-6 text-center">
                            <label class="form-label fw-bold">ลายมือชื่อ ผู้นิเทศ</label>
                            <canvas id="signEvaluator" class="signature-pad"></canvas>
                            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="padEvaluator.clear()">ลบลายเซ็น</button>
                        </div>
                        <hr>
                        <div class="col-md-6 text-center">
                            <label class="form-label text-muted">รองผู้อำนวยการโรงเรียนวัดแม่กะ</label>
                            <input type="text" class="form-control text-center" value="นายจักรพงศ์ จันทวงศ์" readonly>
                        </div>
                        <div class="col-md-6 text-center">
                            <label class="form-label text-muted">ผู้อำนวยการโรงเรียนวัดแม่กะ</label>
                            <input type="text" class="form-control text-center" value="นางสาวศิริยา อินทกาโมทย์" readonly>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 mb-5">
                    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">บันทึกข้อมูลและสร้าง PDF</button>
                </div>
            </form>
        </div>

        <div class="tab-pane fade" id="summary-pane" role="tabpanel">
            <div class="card shadow-sm mb-5">
                <div class="card-header bg-dark text-white">ตารางสรุปผลการนิเทศย้อนหลัง</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ชื่อผู้รับการนิเทศ</th>
                                    <th>รายวิชา</th>
                                    <th>รหัสวิชา</th>
                                    <th>ระดับชั้น</th>
                                    <th>วันที่สอน</th>
                                    <th>ผู้นิเทศ</th>
                                    <th>รูปแบบการนิเทศ</th>
                                    <th>URL ไฟล์ PDF</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody">
                                <tr><td colspan="8" class="text-center text-muted">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-end">
                        <button class="btn btn-sm btn-outline-primary" onclick="loadSummary()">รีเฟรชข้อมูล</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzu3PfncWy6D1X-d_cVLGWK_WBl-mteCWr8U-CP4fa5NzbFdNaVlS9eSK7e2EnS-q1H/exec';

    const staff = [
        "นางสาวศิริยา อินทกาโมทย์", "นายจักรพงศ์ จันทวงศ์", "นางสาวจันทวี ทาเกิด", 
        "นางณพิชญา นิติคุณชัย", "นายณัฐพงษ์ วิริยา", "นายธนะกานต์ ภูมิมาลา", 
        "นางสาวนฤมล กระจ่างโฉม", "นางสาวศศิประภา ชมถิ่น", "นางสาวศิริณทิพย์ สุวรรณ์", "นางสาวเยาวพา มาน้อย"
    ];

    const evaluateeSelect = document.getElementById('evaluateeName');
    const evaluatorSelect = document.getElementById('evaluatorName');
    staff.forEach(name => {
        evaluateeSelect.innerHTML += `<option value="${name}">${name}</option>`;
        evaluatorSelect.innerHTML += `<option value="${name}">${name}</option>`;
    });

    const padEvaluatee = new SignaturePad(document.getElementById('signEvaluatee'));
    const padEvaluator = new SignaturePad(document.getElementById('signEvaluator'));
    const commentPads = [];

    const categoriesData = [
        { title: "1. การเตรียมความพร้อมก่อนสอน", questions: [
            "จัดทำแผนการเรียนรู้ที่มีองค์ประกอบถูกต้องและครบถ้วน",
            "จัดสื่ออุปกรณ์การสอนครบถ้วนสอดคล้องกับกิจกรรมการเรียนการสอน",
            "จัดทำแบบประเมินผลการเรียนรู้สอดคล้องกับตัวชี้วัด/ผลการเรียนรู้"
        ]},
        { title: "2. การจัดกิจกรรมการเรียนรู้", questions: [
            "จัดกิจกรรมสอดคล้องกับตัวชี้วัด/ผลการเรียนรู้",
            "จัดกิจกรรมตามขั้นตอนที่กำหนดไว้ในแผนการจัดการเรียนรู้",
            "เปิดโอกาสให้ผู้เรียนมีส่วนร่วมในกิจกรรมอย่างทั่วถึง",
            "จัดกิจกรรมให้นักเรียนฝึกปฏิบัติจนเกิดทักษะต่างๆ",
            "ใช้เทคนิคการตั้งคำถาม ให้นักเรียนมีส่วนร่วมแสดงความคิดเห็น",
            "เลือกใช้เทคนิคการสอนที่ตอบสนองกับความต้องการของนักเรียน",
            "จัดกิจกรรมส่งเสริมนักเรียนที่เป็นกลุ่มเก่ง",
            "เลือกใช้กิจกรรมซ่อมเสริมนักเรียนที่เป็นกลุ่มอ่อนเพื่อให้เรียนรู้ทันเพื่อน",
            "ใช้การเสริมแรงตลอดการจัดกิจกรรมการเรียนรู้",
            "ตรวจสอบความเข้าใจของนักเรียนระหว่างเรียนอย่างต่อเนื่อง"
        ]},
        { title: "3. การใช้สื่อเทคโนโลยี", questions: [
            "สื่อเทคโนโลยีสอดคล้องกับกิจกรรมการเรียนรู้",
            "สื่อกระตุ้นความสนใจในการเรียนรู้ของผู้เรียน",
            "ครูใช้สื่อการสอนเหมาะสม ถูกต้อง คุ้มค่า"
        ]},
        { title: "4. การจัดบรรยากาศและบริหารชั้นเรียน", questions: [
            "จัดบรรยากาศที่เอื้อต่อการเรียนรู้ของผู้เรียน",
            "ครูกระตุ้นผู้เรียนให้เกิดความสนใจในการเรียนรู้ผ่านสื่อเทคโนโลยี",
            "ครูคอยให้คำแนะนำและแก้ไขปัญหาแก่ผู้เรียน",
            "ครูใช้เทคนิคหลากหลายในการควบคุมชั้นเรียน"
        ]},
        { title: "5. การวัดผลและประเมินผล", questions: [
            "ประเมินศักยภาพผู้เรียนก่อนเรียน",
            "ประเมินศักยภาพผู้เรียนระหว่างเรียน",
            "ประเมินศักยภาพผู้เรียนหลังเรียน",
            "ใช้เทคนิคการประเมินตามสภาพจริง",
            "ผลการจัดการเรียนรู้ทำให้นักเรียนเกิดการเรียนรู้ด้านทักษะ และคุณลักษณะอันพึงประสงค์"
        ]},
        { title: "6. ประเมินแผนการจัดการเรียนรู้", questions: [
            "องค์ประกอบของแผนการจัดการเรียนรู้",
            "สาระสำคัญ",
            "มาตรฐานการเรียนรู้และตัวชี้วัด",
            "จุดประสงค์การเรียนรู้",
            "สาระการเรียนรู้",
            "กระบวนการเรียนรู้/กิจกรรมการเรียนรู้",
            "การวัดและประเมินผลการเรียนรู้",
            "สื่อการจัดการเรียนรู้หรือแหล่งเรียนรู้"
        ]},
        { title: "7. การบริหารจัดการชั้นเรียน", questions: [
            "มีสัญลักษณ์แสดงชาติ ศาสนา พระมหากษัตริย์",
            "มีป้ายนิเทศให้ความรู้ มุมประสบการณ์ต่างๆ",
            "มีมุมผลงาน มุมแสดงความก้าวหน้าของนักเรียน",
            "ห้องเรียน โต๊ะเก้าอี้นักเรียน สะอาด ปลอดภัย",
            "มีตู้โต๊ะเก็บสื่อการสอนเป็นระเบียบ สะดวกต่อการหยิบใช้",
            "ตกแต่งห้องเรียนคำนึงถึงความเรียบง่าย เป็นระเบียบ ประหยัด",
            "มุมเก็บอุปกรณ์ทำความสะอาดเป็นระเบียบเรียบร้อย"
        ]}
    ];

    const questionsContainer = document.getElementById('evaluationQuestions');
    let htmlContent = '';

    categoriesData.forEach((cat, index) => {
        let catNum = index + 1;
        htmlContent += `
        <div class="card shadow-sm mb-4">
            <div class="card-header">${cat.title}</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead class="table-light">
                            <tr class="text-center">
                                <th width="60%">ข้อประเมิน</th>
                                <th width="8%">5</th><th width="8%">4</th><th width="8%">3</th><th width="8%">2</th><th width="8%">1</th>
                            </tr>
                        </thead>
                        <tbody>`;
        cat.questions.forEach((qText, qIndex) => {
            let qNum = qIndex + 1;
            htmlContent += `<tr>
                <td class="question-text"><strong>${catNum}.${qNum}</strong> ${qText}</td>`;
            for (let score = 5; score >= 1; score--) {
                htmlContent += `<td class="text-center">
                    <input class="form-check-input score-radio" type="radio" name="q${catNum}_${qNum}" value="${score}" required onchange="calculateScore()">
                </td>`;
            }
            htmlContent += `</tr>`;
        });
        htmlContent += `
                        </tbody>
                    </table>
                </div>
                <div>
                    <label class="form-label fw-bold">ข้อเสนอแนะหมวด ${catNum} (เขียนด้วยปากกา/นิ้ว)</label>
                    <canvas id="commentCanvas${catNum}" class="comment-pad"></canvas>
                    <button type="button" class="btn btn-sm btn-outline-danger mt-1" onclick="commentPads[${index}].clear()">ลบข้อเสนอแนะ</button>
                </div>
            </div>
        </div>`;
    });
    questionsContainer.innerHTML = htmlContent;

    categoriesData.forEach((cat, index) => {
        let canvas = document.getElementById(`commentCanvas${index + 1}`);
        let pad = new SignaturePad(canvas);
        commentPads.push(pad);
    });

    function resizeCanvas() {
        document.querySelectorAll('canvas').forEach(canvas => {
            let ratio =  Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        });
        padEvaluatee.clear(); padEvaluator.clear();
        commentPads.forEach(pad => pad.clear());
    }
    
    // หน่วงเวลาให้ UI โหลดเสร็จก่อนปรับขนาด Canvas และตอนเปลี่ยนแท็บ
    setTimeout(resizeCanvas, 500);
    document.getElementById('form-tab').addEventListener('shown.bs.tab', function () { resizeCanvas(); });

    let totalScore = 0;
    let percentage = 0;
    let qualityStr = '';
    let categoryScores = [0,0,0,0,0,0,0];

    function calculateScore() {
        totalScore = 0;
        categoryScores = [0,0,0,0,0,0,0];
        
        document.querySelectorAll('.score-radio:checked').forEach(radio => {
            let val = parseInt(radio.value);
            totalScore += val;
            let catIndex = parseInt(radio.name.charAt(1)) - 1;
            categoryScores[catIndex] += val;
        });

        percentage = ((totalScore / 200) * 100).toFixed(2);
        
        if(percentage >= 91) qualityStr = "ดีมาก";
        else if(percentage >= 81) qualityStr = "ดี";
        else if(percentage >= 71) qualityStr = "พอใช้";
        else if(percentage >= 61) qualityStr = "ควรปรับปรุง";
        else qualityStr = "ไม่ผ่าน";

        document.getElementById('totalScoreText').innerText = totalScore;
        document.getElementById('percentText').innerText = percentage;
        document.getElementById('qualityText').innerText = qualityStr;
    }

    // ฟังก์ชันโหลดข้อมูลตารางสรุปผล (Tab 2)
    function loadSummary() {
        const tbody = document.getElementById('summaryTableBody');
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">กำลังโหลดข้อมูล...</td></tr>';
        
        fetch(GAS_URL + "?action=getSummary")
        .then(response => response.json())
        .then(data => {
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">ยังไม่มีข้อมูลการประเมิน</td></tr>';
                return;
            }
            let html = '';
            // นำข้อมูลล่าสุดขึ้นก่อน (reverse)
            data.reverse().forEach(row => {
                let link = row.pdfUrl && row.pdfUrl !== '#' 
                    ? `<a href="${row.pdfUrl}" target="_blank" class="btn btn-sm btn-outline-danger">เปิด PDF</a>` 
                    : '<span class="text-muted">ไม่มีไฟล์</span>';
                html += `<tr>
                    <td>${row.evaluatee}</td>
                    <td>${row.subject}</td>
                    <td>${row.subjectCode}</td>
                    <td>${row.classLevel}</td>
                    <td>${row.date}</td>
                    <td>${row.evaluator}</td>
                    <td>${row.format}</td>
                    <td>${link}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        })
        .catch(error => {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>';
        });
    }

    document.getElementById('evalForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let btn = document.getElementById('submitBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึกข้อมูลและสร้าง PDF...';
        btn.disabled = true;

        let formData = {
            evaluateeName: document.getElementById('evaluateeName').value,
            evaluatorName: document.getElementById('evaluatorName').value,
            supervisionFormat: document.getElementById('supervisionFormat').value,
            subject: document.getElementById('subject').value,
            subjectCode: document.getElementById('subjectCode').value,
            classLevel: document.getElementById('classLevel').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            
            totalScore: totalScore,
            percent: percentage,
            qualityLevel: qualityStr,
            
            cat1: categoryScores[0], cat2: categoryScores[1], cat3: categoryScores[2],
            cat4: categoryScores[3], cat5: categoryScores[4], cat6: categoryScores[5], cat7: categoryScores[6],
            
            signEvaluatee: padEvaluatee.isEmpty() ? '' : padEvaluatee.toDataURL(),
            signEvaluator: padEvaluator.isEmpty() ? '' : padEvaluator.toDataURL()
        };

        categoriesData.forEach((cat, index) => {
            let catNum = index + 1;
            cat.questions.forEach((_, qIndex) => {
                let qNum = qIndex + 1;
                let radio = document.querySelector(`input[name="q${catNum}_${qNum}"]:checked`);
                formData[`q${catNum}_${qNum}`] = radio ? radio.value : 0;
            });
            formData[`comment${catNum}`] = commentPads[index].isEmpty() ? '' : commentPads[index].toDataURL();
        });

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert('บันทึกข้อมูลสำเร็จ! ระบบได้สร้างไฟล์ PDF เรียบร้อยแล้ว');
                window.open(data.pdfUrl, '_blank');
                document.getElementById('evalForm').reset();
                resizeCanvas();
                calculateScore();
                // รีโหลดตารางสรุปผลอัพเดทใหม่
                loadSummary(); 
            } else {
                alert('เกิดข้อผิดพลาด: ' + data.message);
            }
        })
        .catch(error => {
            alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + error);
        })
        .finally(() => {
            btn.innerHTML = 'บันทึกข้อมูลและสร้าง PDF';
            btn.disabled = false;
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
